<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Trading Journal Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f3f4f6;
display:flex;
justify-content:center;
padding:18px;
padding-bottom:100px;
color:#111827;
}

.app{
width:100%;
max-width:430px;
}

.page{display:none}
.active{display:block}

h1{
font-size:32px;
margin-bottom:18px;
}

.card{
background:white;
border-radius:24px;
padding:18px;
margin-bottom:16px;
box-shadow:0 4px 18px rgba(0,0,0,.05);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-bottom:16px;
}

.stat-title{
font-size:13px;
opacity:.55;
margin-bottom:8px;
}

.stat-value{
font-size:23px;
font-weight:700;
}

input,textarea{
width:100%;
padding:16px;
border-radius:18px;
border:1px solid #e5e7eb;
background:#fafafa;
font-size:16px;
margin-top:12px;
}

textarea{
min-height:100px;
resize:none;
}

.save-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#374151;
color:white;
font-size:16px;
font-weight:700;
margin-top:14px;
}

.trade{
background:white;
padding:16px;
border-radius:20px;
margin-bottom:12px;
box-shadow:0 3px 10px rgba(0,0,0,.04);
}

.green{color:#16a34a;font-weight:700}
.red{color:#c2185b;font-weight:700}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:76px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 16px rgba(0,0,0,.06);
}

.nav{
background:none;
border:none;
color:#666;
font-size:13px;
}

.chart-box{
height:240px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
orderBy,
query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwQIZ4_VwOYJjGPXBIQ2cBuWa53v8xCUk",
  authDomain: "zurnalas-app.firebaseapp.com",
  projectId: "zurnalas-app",
  storageBucket: "zurnalas-app.firebasestorage.app",
  messagingSenderId: "721221585239",
  appId: "1:721221585239:web:7ad195906ac6788f381612",
  measurementId: "G-28EFVE6GTF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let trades = [];
let deposits = [];

let chart;

const months = [
'Sausis','Vasaris','Kovas','Balandis',
'Gegužė','Birželis','Liepa','Rugpjūtis',
'Rugsėjis','Spalis','Lapkritis','Gruodis'
];

function todayFormatted(){
const d = new Date();
return String(d.getDate()).padStart(2,'0') + '/' +
String(d.getMonth()+1).padStart(2,'0') + '/' +
String(d.getFullYear()).slice(-2);
}

window.showPage = function(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

window.addTrade = async function(){

const value = parseFloat(document.getElementById('profitInput').value.replace(',','.'));

if(isNaN(value)) return;

const trade = {
asset: document.getElementById('asset').value,
profit: value,
date: document.getElementById('date').value,
notes: document.getElementById('notes').value,
createdAt: Date.now()
};

await addDoc(collection(db,'trades'), trade);

await loadData();

document.getElementById('asset').value='';
document.getElementById('profitInput').value='';
document.getElementById('notes').value='';

showPage('home');
}

window.saveDeposit = async function(){

const value = parseFloat(document.getElementById('depositInput').value.replace(',','.'));

if(isNaN(value)) return;

const deposit = {
amount:value,
date:todayFormatted(),
createdAt: Date.now()
};

await addDoc(collection(db,'deposits'), deposit);

await loadData();

document.getElementById('depositInput').value='';
}

function parseDate(str){
const p = str.split('/');
return new Date('20'+p[2], p[1]-1, p[0]);
}

async function loadData(){

trades = [];
deposits = [];

const tradeQuery = query(collection(db,'trades'), orderBy('createdAt','desc'));
const depositQuery = query(collection(db,'deposits'));

const tradeSnapshot = await getDocs(tradeQuery);
const depositSnapshot = await getDocs(depositQuery);

tradeSnapshot.forEach(doc=>{
trades.push(doc.data());
});

depositSnapshot.forEach(doc=>{
deposits.push(doc.data());
});

if(deposits.length===0){

const firstDeposit = {
amount:150,
date:'01/05/25',
createdAt: Date.now()
};

await addDoc(collection(db,'deposits'), firstDeposit);

deposits.push(firstDeposit);
}

render();
}

function render(){

const totalDeposits = deposits.reduce((a,b)=>a+b.amount,0);

let total = totalDeposits;
let wins = 0;

const history = document.getElementById('historyList');
history.innerHTML='';

trades.forEach(t=>{

total += t.profit;

if(t.profit > 0) wins++;

const div = document.createElement('div');

div.className='trade';

div.innerHTML=`
<strong>${t.asset}</strong>
<br><br>
<span class="${t.profit >=0 ? 'green':'red'}">
${t.profit >=0 ? '+' : ''}$${t.profit.toFixed(2)}
</span>
<br><br>
${t.date}
<br>
<small>${t.notes}</small>
`;

history.appendChild(div);

});

document.getElementById('balance').innerText =
'$'+total.toFixed(2);

const totalProfit = trades.reduce((a,b)=>a+b.profit,0);

const growth =
totalDeposits > 0
? ((totalProfit/totalDeposits)*100)
: 0;

document.getElementById('growth').innerText =
(growth >=0 ? '+' : '') + growth.toFixed(1) + '%';

document.getElementById('winrate').innerText =
trades.length
? ((wins/trades.length)*100).toFixed(0) + '%'
: '0%';

drawChart();
}

function drawChart(){

const ctx = document.getElementById('equityChart');

if(chart){
chart.destroy();
}

const events = [];

deposits.forEach(d=>{
events.push({
date:d.date,
amount:d.amount
});
});

trades.forEach(t=>{
events.push({
date:t.date,
amount:t.profit
});
});

events.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

let balance = 0;

const labels = [];
const data = [];

events.forEach(e=>{
balance += e.amount;
labels.push(e.date);
data.push(balance);
});

chart = new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
data:data,
borderColor:'#374151',
backgroundColor:'rgba(55,65,81,0.08)',
fill:true,
tension:0.4,
borderWidth:3
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false}
}
}
});

}

window.onload = async ()=>{

document.getElementById('date').value = todayFormatted();

await loadData();

}

</script>

</head>
<body>

<div class="app">

<div id="home" class="page active">

<h1>Žurnalas</h1>

<div class="stats">

<div class="card">
<div class="stat-title">Balansas</div>
<div class="stat-value" id="balance">$0</div>
</div>

<div class="card">
<div class="stat-title">Growth</div>
<div class="stat-value" id="growth">0%</div>
</div>

<div class="card">
<div class="stat-title">Winrate</div>
<div class="stat-value" id="winrate">0%</div>
</div>

</div>

<div class="card">
<div class="stat-title">Balanso grafikas</div>

<div class="chart-box">
<canvas id="equityChart"></canvas>
</div>

</div>

<div class="card">
<div class="stat-title">Depozitas ($)</div>
<input id="depositInput" placeholder="Įvesk depozitą">
<button class="save-btn" onclick="saveDeposit()">Išsaugoti</button>
</div>

</div>

<div id="add" class="page">

<h1>Pridėti sandorį</h1>

<div class="card">

<input id="asset" placeholder="Asset">

<input id="profitInput" placeholder="Pelnas / Nuostolis ($)">

<input type="text" id="date" placeholder="dd/mm/yy">

<textarea id="notes" placeholder="Pastabos"></textarea>

<button class="save-btn" onclick="addTrade()">Išsaugoti</button>

</div>

</div>

<div id="history" class="page">

<h1>History</h1>

<div id="historyList"></div>

</div>

<div class="bottom">
<button class="nav" onclick="showPage('home')">🏠 Home</button>
<button class="nav" onclick="showPage('add')">➕ Add</button>
<button class="nav" onclick="showPage('history')">📊 History</button>
</div>

</div>

</body>
</html>
